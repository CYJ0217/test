name: Deploy to Internal K3s Cluster

on:
  push:
    branches:
      - main

# 2026년 6월 변경안에 맞춰 Node.js 24 환경을 강제로 사용하도록 설정합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      # Node 24를 지원하는 최신 버전의 액션으로 업그레이드합니다.
      uses: actions/checkout@v4 

    - name: Executing remote ssh commands using ssh-key
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ${{ secrets.BASTION_USERNAME }}
        key: ${{ secrets.BASTION_SSH_KEY }}
        port: 22
        script: |
          echo "==== [1/3] 깃허브가 배스천 리모컨에 무사히 접속했습니다! ===="
          
          mkdir -p ~/cicd-workspace
          cd ~/cicd-workspace
          
          echo "==== [2/3] 최신 배포 설정(YAML)을 깃허브로부터 받아옵니다. ===="
          cat << 'EOF' > webapp-prod.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: hello-web
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: hello-web
            template:
              metadata:
                labels:
                  app: hello-web
              spec:
                containers:
                - name: web-server
                  image: nginxdemos/hello:plain-text
                  ports:
                  - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: hello-web-svc
          spec:
            selector:
              app: hello-web
            ports:
            - protocol: TCP
              port: 80
              targetPort: 80
          EOF

          echo "==== [3/3] 내부망 쿠버네티스(K3s) 기지에 자동 배포를 감행합니다! ===="
          kubectl apply -f webapp-prod.yaml
          
          echo "==== [완료] 무중단 자동 배포가 성공적으로 완료되었습니다! ===="
          kubectl get pods -l app=hello-web
