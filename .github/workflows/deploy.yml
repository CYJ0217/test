name: Deploy to Internal K3s Cluster

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push되면 자동으로 공장이 돌아갑니다.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Executing remote ssh commands using ssh-key
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BASTION_HOST }}
        username: ${{ secrets.BASTION_USERNAME }}
        key: ${{ secrets.BASTION_SSH_KEY }}
        port: 22
        script: |
          echo "==== [1/3] 깃허브가 배스천 리모컨에 무사히 접속했습니다! ===="
          
          # 배스천 내부에 작업용 폴더를 만들고 이동합니다.
          mkdir -p ~/cicd-workspace
          cd ~/cicd-workspace
          
          echo "==== [2/3] 최신 배포 설정(YAML)을 깃허브로부터 받아옵니다. ===="
          # 실습 편의를 위해 배스천 안에서 최신 배포 야믈 파일을 깃허브 저장소에서 직접 다운받거나 갱신하도록 세팅합니다.
          cat << 'EOF' > webapp-prod.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: hello-web
          spec:
            replicas: 2  # 자동화 검증을 위해 포드를 2대로 늘려봅니다!
            selector:
              matchLabels:
                app: hello-web
            template:
              metadata:
                labels:
                  app: hello-web
              spec:
                containers:
                - name: web-server
                  image: nginxdemos/hello:plain-text
                  ports:
                  - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: hello-web-svc
          spec:
            selector:
              app: hello-web
            ports:
            - protocol: TCP
              port: 80
              targetPort: 80
          EOF

          echo "==== [3/3] 내부망 쿠버네티스(K3s) 기지에 자동 배포를 감행합니다! ===="
          kubectl apply -f webapp-prod.yaml
          
          echo "==== [완료] 무중단 자동 배포가 성공적으로 완료되었습니다! ===="
          kubectl get pods -l app=hello-web
